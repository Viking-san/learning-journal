name: Deploy to production

on:
  push:
    branches: [ main ]
  # Запускается только при push в main
  # При push в другие ветки — не деплоит

jobs:
  # Сначала запускаем тесты
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: dummy-secret-key-for-tests
          DEBUG: 'True'
        run: python manage.py test

  # Деплоим только если тесты прошли
  deploy:
    runs-on: ubuntu-latest
    needs: test
    # needs: test — этот job запустится только после успешного test
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        # appleboy/ssh-action — популярный action для выполнения команд по SSH
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/projects/learning-journal
            git pull
            docker compose up -d --build
            docker compose restart nginx
