services:

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Порт не пробрасываем — база не должна быть доступна снаружи Docker сети

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # /data — папка внутри контейнера где MinIO хранит файлы
    # --console-address ":9001" — веб-интерфейс MinIO будет на порту 9001
    # порт 9000 — это API (куда Django отправляет файлы)
    env_file:
      - .env
    environment:
      # MinIO ожидает именно эти названия переменных для логина/пароля
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Порты тоже не пробрасываем — MinIO доступен только через nginx

  createbuckets:
    image: minio/mc:latest
    # minio/mc — это MinIO Client, утилита для управления MinIO
    # Этот сервис запустится один раз, создаст бакет и завершится
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing myminio/$${MINIO_BUCKET_NAME} &&
      mc anonymous set download myminio/$${MINIO_BUCKET_NAME} &&
      mc quota set myminio/$${MINIO_BUCKET_NAME} --size 5GiB
      "
    # mc alias set — подключиться к MinIO (дать ему имя myminio)
    # mc mb --ignore-existing — создать бакет (если уже есть — не ругаться)
    # mc anonymous set download — сделать файлы публично доступными на чтение
    # mc quota set --size 5GiB — ограничить бакет 5 гигабайтами

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1"
    # --workers 2 — два рабочих процесса gunicorn
    # на слабом сервере больше не нужно, меньше памяти потребляет, сейчас вообще оставил 1
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      # media_volume больше не нужен — файлы идут в MinIO
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # Единственный сервис с открытым портом наружу
      # Весь входящий трафик идёт через nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # ro — read only, nginx только читает конфиг, не пишет
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web
      - minio

volumes:
  postgres_data:
  minio_data:
  static_volume: