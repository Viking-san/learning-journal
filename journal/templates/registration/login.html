{% extends "journal/base.html" %}
{% block title %}Вход — Learning Journal{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2>Вход</h2>
        {% if form.errors %}
        <div class="alert alert-danger" role="alert">Неверный логин или пароль.</div>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Логин</label>
                <input type="text" name="username" id="id_username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">Пароль</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p class="mt-3 small text-muted">
            Нет аккаунта? <a href="{% url 'signup' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
